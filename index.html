<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padrão Imperial | A Nobreza do Chocolate</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ouro: #D4AF37;
            --ouro-dark: #A68926;
            --ouro-glow: rgba(212, 175, 55, 0.4);
            --preto: #050505;
            --bg-card: rgba(15, 15, 15, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--preto);
            background: linear-gradient(to bottom, var(--preto) 85%, #1a1500 100%);
            color: #fff;
            overflow-x: hidden;
            position: relative;
            padding-bottom: 120px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, var(--ouro) 1px, transparent 1px),
                linear-gradient(to bottom, var(--ouro) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.1) 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, rgba(0,0,0,0.1) 90%, transparent 100%);
            opacity: 0.15; z-index: -1; pointer-events: none;
        }

        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .logo { width: 130px; margin-bottom: 15px; animation: float 5s ease-in-out infinite; filter: drop-shadow(0 0 25px var(--ouro-glow)); }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 7vw, 2.8rem); margin: 0; background: linear-gradient(to bottom, #fff, var(--ouro)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }

        .container { max-width: 1100px; margin: 0 auto 60px; padding: 0 20px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

        .produto-card { background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.1); position: relative; cursor: pointer; transition: transform 0.3s ease; }
        .produto-card:hover { transform: scale(1.05); }
        .produto-card:hover .img-container img { transform: translateY(calc(var(--scroll-y, 0px) - 10px)); }
        .produto-card.bounce { animation: bounce 0.5s ease; }
        .produto-card.bounce .img-container img { animation: imgBounce 0.5s ease; }
        .img-container { height: 280px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; transform: translateY(var(--scroll-y, 0px)); }
        .detalhes { padding: 20px; text-align: center; }
        .detalhes h3 { font-family: 'Playfair Display', serif; color: var(--ouro); margin: 0 0 10px; font-size: 1.3rem; }
        
        .controles-qtd { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .btn-qtd { background: none; border: 1px solid var(--ouro); color: var(--ouro); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .btn-qtd:hover { background: var(--ouro); color: #000; }

        .btn-add { background: var(--ouro); color: #000; padding: 12px 20px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.8rem; position: relative; transition: transform 0.3s ease; }
        .btn-add.animating { animation: btnPulse 0.6s ease; }

        .cart-float {
            position: fixed; top: 25px; right: 25px; background: var(--ouro); color: #000; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            cursor: pointer; z-index: 1001; box-shadow: 0 0 20px var(--ouro-glow);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cart-float.pulse { transform: scale(1.3); }
        .cart-count { position: absolute; top: -2px; right: -2px; background: #fff; color: #000; font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--ouro); }

        .particle { position: fixed; width: 12px; height: 12px; background: var(--ouro); border-radius: 50%; z-index: 9999; pointer-events: none; box-shadow: 0 0 10px var(--ouro); transition: all 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045); }

        .social-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--ouro); display: flex; gap: 25px; z-index: 1000; }
        .social-bar a { color: #fff; font-size: 1.1rem; text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); padding: 20px; overflow-y: auto; }
        .modal-content { background: #0a0a0a; max-width: 450px; margin: 20px auto; border-radius: 25px; border: 1px solid var(--ouro); padding: 30px; position: relative; }
        .item-carrinho { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 12px 0; align-items: center; }
        
        .input-group { margin-top: 15px; text-align: left; }
        .input-group label { display: block; color: var(--ouro); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; background: #151515; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; box-sizing: border-box; font-family: inherit; }
        .input-group textarea { height: 80px; resize: none; }
        .help-text { font-size: 0.7rem; color: #666; margin-top: 4px; font-style: italic; }

        .modal-imagem { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); padding: 20px; overflow: auto; align-items: center; justify-content: center; }
        .modal-imagem.ativo { display: flex; }
        .modal-imagem-content { position: relative; max-width: 90vw; max-height: 90vh; }
        .modal-imagem img { width: 100%; height: auto; border-radius: 20px; box-shadow: 0 0 50px var(--ouro-glow); }
        .modal-imagem-close { position: absolute; top: -50px; right: 0; color: var(--ouro); font-size: 3rem; cursor: pointer; background: none; border: none; }
        .img-container img { cursor: pointer; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes imgBounce { 0% { transform: scale(1); } 50% { transform: scale(0.9); } 100% { transform: scale(1); } }
        @keyframes btnPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div class="cart-float" id="main-cart" onclick="abrirCarrinho()">
    <i class="fas fa-shopping-bag"></i>
    <span class="cart-count" id="global-cart-count">0</span>
</div>

<header>
    <img src="logo.png" class="logo" alt="Padrão Imperial">
    <h1>PADRÃO IMPERIAL</h1>
</header>

<div class="container">
    <div id="modalImagem" class="modal-imagem" onclick="fecharImagemModal(event)">
        <div class="modal-imagem-content" onclick="event.stopPropagation()">
            <button class="modal-imagem-close" onclick="fecharImagemModal()">&times;</button>
            <img id="imagemAmpliada" src="" alt="Imagem ampliada">
        </div>
    </div>
    <div class="grid-produtos">
        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="brigadeiro.jpg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Brigadeiro Belga</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 6,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('brigadeiro', -1)">-</button>
                    <span class="qtd-num" id="qtd-brigadeiro">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('brigadeiro', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Brigadeiro Belga', 'brigadeiro')">Adicionar ✨</button>
            </div>
        </div>

        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="maracuja.jpg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Maracujá Imperial</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 6,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('maracuja', -1)">-</button>
                    <span class="qtd-num" id="qtd-maracuja">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('maracuja', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Maracujá Imperial', 'maracuja')">Adicionar ✨</button>
            </div>
        </div>

        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="beijinho.jpg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Beijinho Sublime</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 6,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('beijinho', -1)">-</button>
                    <span class="qtd-num" id="qtd-beijinho">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('beijinho', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Beijinho Sublime', 'beijinho')">Adicionar ✨</button>
            </div>
        </div>

        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="limão.jpeg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Limão Imperial</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 6,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('limao', -1)">-</button>
                    <span class="qtd-num" id="qtd-limao">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('limao', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Limão Imperial', 'limao')">Adicionar ✨</button>
            </div>
        </div>

        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="ninho.jpeg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Ninho Imperial</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 7,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('ninho', -1)">-</button>
                    <span class="qtd-num" id="qtd-ninho">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('ninho', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Ninho Imperial', 'ninho')">Adicionar ✨</button>
            </div>
        </div>

        <div class="produto-card" onclick="animarProduto(this)">
            <div class="img-container"><img src="capuccino.jpeg" onclick="event.stopPropagation(); abrirImagemModal(this.src)"></div>
            <div class="detalhes">
                <h3>Capuccino Imperial</h3>
                <p style="color: var(--ouro); font-weight: 600; margin: 5px 0;">R$ 7,00</p>
                <div class="controles-qtd">
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('capuccino', -1)">-</button>
                    <span class="qtd-num" id="qtd-capuccino">1</span>
                    <button class="btn-qtd" onclick="event.stopPropagation(); alterarQtdCard('capuccino', 1)">+</button>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); animarEAdicionar(this, 'Capuccino Imperial', 'capuccino')">Adicionar ✨</button>
            </div>
        </div>

    </div>
</div>

<div class="social-bar">
    <a href="https://www.instagram.com/chocolateria.padrao.imperial" target="_blank"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
    <a href="https://api.whatsapp.com/send?phone=5567992648892&text=%F0%9F%91%8B%20Ol%C3%A1!%20Vi%20o%20site%20da%20Padr%C3%A3o%20Imperial%20e%20fiquei%20encantado(a)%20com%20os%20detalhes!%20%F0%9F%A5%B3%0A%0A%F0%9F%8D%AB%20Gostaria%20de%20receber%20o%20card%C3%A1pio%20completo%20e%20conhecer%20mais%20sobre%20as%20experiências%20disponíveis.%20Pode%20me%20ajudar?%20%E2%9C%A8" target="_blank"><i class="fab fa-whatsapp"></i> <span>Dúvidas</span></a>
</div>

<div id="modalCarrinho" class="modal">
    <div class="modal-content">
        <span onclick="fecharCarrinho()" style="position: absolute; right: 20px; top: 10px; cursor: pointer; color: var(--ouro); font-size: 2rem;">&times;</span>
        <h2 style="font-family: 'Playfair Display'; color: var(--ouro); text-align: center;">Meu Carrinho 👑</h2>
        <div id="lista-itens-carrinho"></div>
        <div id="form-entrega" style="display:none;">
            <div class="input-group"><label>Seu Nome</label><input type="text" id="c-nome" placeholder="Ex: Maria Silva"></div>
            <div class="input-group"><label>Endereço de Entrega</label><input type="text" id="c-rua" placeholder="Rua, número e bairro"></div>
            <div class="input-group">
                <label>Observações ou Mensagem</label>
                <textarea id="c-obs" placeholder="Ex: Embrulhar para presente..."></textarea>
            </div>
            <button class="btn-add" style="margin-top: 25px; height: 50px;" onclick="finalizarCarrinho()">Enviar Pedido 👑</button>
        </div>
        <p id="carrinho-vazio" style="text-align:center; color:#555; margin-top:20px;">O carrinho está vazio...</p>
    </div>
</div>

<script>
    let carrinho = [];
    const FONE = "5567992648892";

    function alterarQtdCard(id, delta) {
        const span = document.getElementById(`qtd-${id}`);
        let atual = parseInt(span.innerText);
        atual += delta;
        if(atual < 1) atual = 1;
        span.innerText = atual;
    }

    function animarProduto(card) {
        card.classList.add('bounce');
        setTimeout(() => card.classList.remove('bounce'), 500);
    }

    function animarEAdicionar(botao, nome, id) {
        botao.classList.add('animating');
        const cart = document.getElementById('main-cart');
        const btnRect = botao.getBoundingClientRect();
        const cartRect = cart.getBoundingClientRect();
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${btnRect.left + btnRect.width/2}px`;
        particle.style.top = `${btnRect.top + btnRect.height/2}px`;
        document.body.appendChild(particle);
        setTimeout(() => {
            particle.style.left = `${cartRect.left + cartRect.width/2}px`;
            particle.style.top = `${cartRect.top + cartRect.height/2}px`;
            particle.style.transform = 'scale(0.2)';
            particle.style.opacity = '0';
        }, 50);
        const qtd = parseInt(document.getElementById(`qtd-${id}`).innerText);
        const index = carrinho.findIndex(item => item.nome === nome);
        if(index > -1) { carrinho[index].qtd += qtd; } else { carrinho.push({ nome, qtd }); }
        setTimeout(() => {
            atualizarContadorCarrinho();
            cart.classList.add('pulse');
            setTimeout(() => cart.classList.remove('pulse'), 200);
            particle.remove();
            botao.classList.remove('animating');
        }, 600);
        document.getElementById(`qtd-${id}`).innerText = "1";
    }

    function atualizarContadorCarrinho() {
        const total = carrinho.reduce((sum, item) => sum + item.qtd, 0);
        document.getElementById('global-cart-count').innerText = total;
    }

    function abrirCarrinho() {
        const modal = document.getElementById('modalCarrinho');
        const lista = document.getElementById('lista-itens-carrinho');
        const vazio = document.getElementById('carrinho-vazio');
        const form = document.getElementById('form-entrega');
        lista.innerHTML = "";
        if(carrinho.length === 0) {
            vazio.style.display = "block"; form.style.display = "none";
        } else {
            vazio.style.display = "none"; form.style.display = "block";
            carrinho.forEach((item, index) => {
                lista.innerHTML += `<div class="item-carrinho"><span><b>${item.qtd}x</b> ${item.nome}</span><button onclick="removerItem(${index})" style="background:none; border:none; color:#ff4444; cursor:pointer;"><i class="fas fa-trash"></i></button></div>`;
            });
        }
        modal.style.display = "block";
    }

    function removerItem(index) { carrinho.splice(index, 1); atualizarContadorCarrinho(); abrirCarrinho(); }
    function fecharCarrinho() { document.getElementById('modalCarrinho').style.display = "none"; }

    function finalizarCarrinho() {
        const nome = document.getElementById('c-nome').value;
        const rua = document.getElementById('c-rua').value;
        const obs = document.getElementById('c-obs').value;
        
        if(!nome || !rua) { alert("Por favor, preencha nome e endereço."); return; }
        
        // Montagem do resumo usando Unicode para evitar interrogações
        let resumo = "";
        carrinho.forEach(item => resumo += "\u{2794} " + item.qtd + "x " + item.nome + "\n");
        
        const coroa = "\u{1F451}";   
        const shop = "\u{1F6D2}"; 
        const pin = "\u{1F4CD}";      
        const note = "\u{1F4DD}";    
        const sparkles = "\u{2728}";

        const texto = coroa + " *NOVO PEDIDO IMPERIAL* " + coroa + "\n\n" +
                      "Me chamo *" + nome + "* e montei meu carrinho:\n\n" +
                      shop + " *ITENS:* \n" + resumo + "\n" +
                      pin + " *ENTREGA:* \n" + rua + "\n\n" +
                      (obs ? note + " *OBS:* \n\"" + obs + "\"\n\n" : "") +
                      "Pode confirmar? " + sparkles;
        
        const url = "https://api.whatsapp.com/send?phone=" + FONE + "&text=" + encodeURIComponent(texto);
        window.open(url, "_blank");
    }

    window.onclick = function(e) { if(e.target.className == 'modal') fecharCarrinho(); }

    function abrirImagemModal(src) {
        const modal = document.getElementById('modalImagem');
        const img = document.getElementById('imagemAmpliada');
        img.src = src;
        modal.classList.add('ativo');
    }

    function fecharImagemModal(event) {
        if(event && event.target.id !== 'modalImagem') return;
        const modal = document.getElementById('modalImagem');
        modal.classList.remove('ativo');
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') fecharImagemModal();
    });

    window.addEventListener('scroll', () => {
        const imgs = document.querySelectorAll('.img-container img');
        const scrollY = window.scrollY;
        imgs.forEach(img => {
            img.style.setProperty('--scroll-y', `${-scrollY * 0.015}px`);
        });
    });
</script>
</body>
</html>
